# Run with: podman-compose up -d
# File is named docker-compose.yml for compatibility but always use podman.
services:
  klaus:
    build:
      context: .
      dockerfile: Containerfile
    ports:
      - "8000:8000"
    volumes:
      - ./config:/app/config
    environment:
      - KLAUS_LOG_LEVEL=info
      - DATABASE_URL=postgresql://klaus:klaus@postgres:5432/klaus
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    restart: unless-stopped

  postgres:
    build:
      context: .
      dockerfile: Containerfile.postgres
    image: klaus-postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: klaus
      POSTGRES_USER: klaus
      POSTGRES_PASSWORD: klaus
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U klaus"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  # One-shot init: pulls required models into the ollama container.
  # Runs once on first `podman-compose up`, then exits.
  ollama-init:
    image: curlimages/curl:latest
    depends_on:
      ollama:
        condition: service_started
    restart: "no"
    entrypoint: ["sh", "-c"]
    command:
      - |
        echo "Waiting for Ollama to be ready..."
        until curl -sf http://ollama:11434/api/tags > /dev/null 2>&1; do sleep 2; done
        echo "Pulling required models..."
        curl -sf -X POST http://ollama:11434/api/pull -d '{"name":"llama3.2","stream":false}'
        echo "✓ llama3.2"
        curl -sf -X POST http://ollama:11434/api/pull -d '{"name":"nomic-embed-text","stream":false}'
        echo "✓ nomic-embed-text"
        curl -sf -X POST http://ollama:11434/api/pull -d '{"name":"gemma4:latest","stream":false}'
        echo "✓ gemma4:latest"
        echo "All required models ready."

volumes:
  postgres_data:
  ollama_data:
