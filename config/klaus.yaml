database:
  url: postgresql://klaus:klaus@localhost:5432/klaus
  pool_min: 2
  pool_max: 10

server:
  host: "0.0.0.0"
  port: 8000

default_backend: ollama
prefer_local: true

# Models that must be available locally before startup.
# klaus-dev will auto-pull any missing ones from Ollama.
required_models:
  - llama3.2             # default chat model
  - nomic-embed-text     # embedding model for memory search
  - gemma4:latest        # vision model for image analysis

embedding:
  model: nomic-embed-text
  base_url: http://localhost:11434

# Multi-agent orchestrator: uses a planner model to decompose complex requests
# and dispatch sub-tasks to the best-fit models.
orchestrator:
  planner_backend: ollama
  planner_model: qwen3:14b
  md_tools_dir: data/tools

model_backends:
  ollama:
    type: ollama
    base_url: http://localhost:11434
    models:
      - llama3.2
    default_model: llama3.2
    locality: local

  gemini:
    type: gemini
    base_url: https://generativelanguage.googleapis.com
    default_model: gemini-2.5-flash
    locality: cloud

# Optional: Hugging Face Inference API (set HF_TOKEN in .env first):
#  huggingface:
#    type: huggingface
#    default_model: Qwen/Qwen3-235B-A22B
#    locality: cloud
#    # Set HF_TOKEN in .env or use options.api_key below:
#    # options:
#    #   api_key: hf_...

# Task routing: assign specific models to task types.
# You can also add/remove these at runtime from the Routing tab in the dashboard.
task_routing:
  coding:
    preferred_backend: ollama
    preferred_model:  gemma4:26b
    fallback_backends: [ollama]
    description: Programming and software development tasks
    keywords: [code, function, class, bug, debug, refactor, implement, python, javascript, rust, html, css, sql, api, regex, git, deploy, test, script, error, exception, program]
  reasoning:
    preferred_backend: ollama
    preferred_model:  gemma4:latest
    description: Logical reasoning, math, and problem-solving
    keywords: [think, reason, logic, proof, deduce, math, equation, solve, puzzle, hypothesis, theorem, philosophy]
  chat:
    preferred_backend: ollama
    preferred_model: llama3.2
    description: General conversation and Q&A
    keywords: [hello, hi, hey, thanks, help, question, explain, tell me, what is, how do]
  analysis:
    preferred_backend: ollama
    preferred_model: qwen3:14b
    description: Data analysis, research, and reporting
    keywords: [analyze, data, statistics, chart, graph, trend, insight, report, metric, benchmark, research, findings]
  creative:
    preferred_backend: ollama
    preferred_model:  gemma4:latest
    description: Creative writing and content generation
    keywords: [write, story, poem, creative, imagine, fiction, essay, blog, song, lyrics, brainstorm, narrative]
  summarization:
    preferred_backend: ollama
    preferred_model:  gemma4:latest
    description: Text summarization and condensation
    keywords: [summarize, summary, tldr, brief, condense, recap, overview, key points, highlights]
  image:
    preferred_backend: ollama
    preferred_model: gemma4:latest
    description: Image analysis and visual understanding
    keywords: [image, photo, picture, visual, describe, identify, what is this, screenshot, diagram]

# ── MCP servers — three ways to register ─────────────────
#
# 1. Inline in this file:
# mcp_servers:
#   filesystem:
#     command: npx
#     args: ["-y", "@modelcontextprotocol/server-filesystem", "/tmp"]
#     enabled: true
#
# 2. Point to mcp.json files (Cursor/Claude format):
# mcp_config_files:
#   - .cursor/mcp.json
#   - ~/.cursor/mcp.json
#
# 3. Auto-discovery: Klaus checks mcp.json, .cursor/mcp.json,
#    and ~/.cursor/mcp.json on startup automatically.
#
# OAuth servers: just provide the URL — the MCP SDK handles auth automatically:
#   {
#     "mcpServers": {
#       "Atlassian-MCP-Server": {
#         "url": "https://mcp.atlassian.com/v1/mcp/authv2"
#       }
#     }
#   }

# Langfuse tracing (optional — set keys to enable observability).
# Can also be set via LANGFUSE_SECRET_KEY / LANGFUSE_PUBLIC_KEY env vars.
#
# langfuse_secret_key: sk-lf-...
# langfuse_public_key: pk-lf-...
# langfuse_host: https://cloud.langfuse.com

log_level: info
